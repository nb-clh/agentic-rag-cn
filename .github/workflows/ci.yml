name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Python Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax
        run: |
          python -m py_compile app/main.py
          python -m py_compile app/api.py
          python -m py_compile core/orchestrator.py
          python -m py_compile core/llm.py
          python -m py_compile core/trace.py
          python -m py_compile retrieval/web.py
          python -m py_compile retrieval/multi_source.py
          python -m py_compile retrieval/vector.py
          python -m py_compile retrieval/rerank.py
          python -m py_compile retrieval/rewrite.py
          python -m py_compile retrieval/decompose.py
          python -m py_compile retrieval/clean.py
          python -m py_compile retrieval/chunker.py
          python -m py_compile retrieval/budget.py
          python -m py_compile retrieval/source_weights.py
          python -m py_compile retrieval/evidence.py
          python -m py_compile retrieval/contradiction.py
          python -m py_compile retrieval/information_gain.py
          python -m py_compile cache/redis_cache.py
          python -m py_compile system_services/semantic_cache.py
          python -m py_compile system_services/session_memory.py
          python -m py_compile system_services/feedback_logger.py
          python -m py_compile observability/evaluator.py
          python -m py_compile observability/trace_store.py
          python -m py_compile infra/model_loader.py

  validate-compose:
    name: Validate docker-compose.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate compose file
        run: docker compose config --quiet

  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, validate-compose]
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t agentic-rag-cn:test .
